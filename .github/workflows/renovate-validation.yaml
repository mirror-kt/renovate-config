name: renovate config
on: pull_request

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - name: pnpm install
        run: pnpm install
      - name: validation
        run: |
          pnpm exec renovate-config-validator \
            renovate.json \
            default.json \
            pnpm-nodeversion.json
