name: renovate config
on: pull_request

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - name: pnpm install
        run: pnpm install
      - name: validation
        run: |
          pnpm exec renovate-config-validator \
            renovate.json \
            default.json \
            pnpm-nodeversion.json
